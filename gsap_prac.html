<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gsap Practice</title>

    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .section0 {
            height: 100vh;
            width: 100%;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .section1 {
            position: relative;
            overflow: hidden;
            height: 100vh;
            width: min(90%, 900px);
            margin: 0 auto;

            display: flex;
            gap: 1rem;
        }

        .section1 .title {
            position: absolute;
            top: 50%;
            left: 50%;

            width: 50%;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .section1 .title h2 {
            text-align: center;
        }

        .section1 .cards-container {
            position: relative;
            flex: 1;

            margin-left: 50%;
            /* border: 2px solid black; */
            padding: 1rem;
        }

        .section1 .title {
            flex: 1;
        }

        .section1 .card {
            /* border: 2px solid black; */
            position: absolute;
            top: 50%;
            left: 50%;
            width: min(90%, 400px);

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .section1 .card img {
            height: 40px;
            margin: 0.5rem auto;
        }

         .section1 .card h3 {
            color: rgb(103, 173, 220);
            margin-bottom: 2rem
         }

         .section1 .card p {
            color: rgb(121, 127, 133);
            margin: 0.5rem auto;
            border-top: 1px solid rgba(121, 127, 133, 0.4);
         }
    </style>
</head>
<body>
    <section class="section0">
        <h2>융창에 오신 것을 환영합니다.</h2>
    </section>
    <section class="section1">
        <div class="title">
            <h2>100년 경영을 위한 지속성장</h2>
        </div>

        <div class="cards-container">
            <div class="card card1">
                <img src="./pictures/인간중심.png" alt="인간 중심의 경영">
                <h3>인간 중심의 경영</h3>

                <p>“사람이 미래다”란 슬로건 아래 경영의 목표는 고객과 임직원의 행복 추구</p>
                <p>임직원의 개인적 발전과 행복을 최우선으로 판단함으로써 기업의 장기적인 존속과 발전 도모</p>
            </div>

            <div class="card card2">
                <img src="./pictures/합리적.png" alt="합리적 경영">
                <h3>합리적 경영</h3>

                <p>근시안적 물질 만능이 아닌 합리적인 판단을 통한 장기적인 이익 추구</p>
                <p>수평적인 조직 문화와 솔선수범하는 문화</p>
                <p>변화하는 트렌드에 유연하게 대처</p>
            </div>
        </div>

    </section>






    <!-- GSAP 라이브러리 설정 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.1/ScrollToPlugin.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        gsap.set(".section1 .title", {
            xPercent: -50,
            yPercent: -50,
            opacity: 0,
            scale: 1.2
        });
        gsap.set(".section1 .card", {
            xPercent: -50,
            yPercent: -50,
            // opacity: 0
        });

        // gsap.set(".cards-container .card", {
        //     opacity: 0
        // });


        const method = gsap.timeline();

        method
        .to({}, { duration: 0.2 })

        .to(".section1 .title", {
            opacity: 1
        })

        .to({}, { duration: 0.2 })

        .to(".section1 .title", {
            left: "25%",
            scale: 1
        })

        .to({}, { duration: 0.2 })

        .from(".cards-container .card1",
            {
                x: 20,
                opacity: 0,
                scale: 1.05
            })

        .to({}, { duration: 0.2 })

        .to(".cards-container .card1", {
            x: -20,
            opacity: 0,
            scale: 0.95
        })

        .from(".cards-container .card2",
            {
                x: 20,
                opacity: 0,
                scale: 1.05
            });

        ScrollTrigger.create({
            animation: method,
            trigger: ".section1",
            start: 'top top',
            end: '+=4500',
            scrub: 2,
            pin: true,
            anticipatePin: 1,
            markers: true
        });
    </script>
</body>
</html>
